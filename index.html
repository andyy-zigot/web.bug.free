<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="user-scalable=no, width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"/>
    <title>ANDYY BUG</title>
<style>
    body {
        background: #000;
        margin: 0;
        overflow: hidden;
        font-family: 'Courier New', monospace;
    }

    #launcher {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, #001a00 0%, #000 100%);
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #39FF14;
        transition: opacity 0.5s;
    }

    .panel {
        background: rgba(10, 10, 10, 0.95);
        padding: 40px;
        border: 2px solid #39FF14;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 0 40px #39FF14, inset 0 0 20px rgba(57,255,20,0.2);
        backdrop-filter: blur(10px);
    }

    h1 {
        color: #39FF14;
        text-shadow: 0 0 10px #39FF14, 0 0 25px #39FF14;
        letter-spacing: 5px;
        margin: 0;
    }

    /* INPUT KEREN */
    input {
        width: 80%;
        padding: 15px;
        margin: 25px 0;
        background: rgba(0,0,0,0.8);
        border: 2px solid #39FF14;
        color: #39FF14;
        font-weight: bold;
        text-align: center;
        font-size: 1.2em;
        outline: none;
        border-radius: 10px;
        box-shadow: 0 0 10px #39FF14 inset;
        transition: 0.3s;
    }

    input:focus {
        box-shadow: 0 0 20px #39FF14, 0 0 40px rgba(57,255,20,0.5);
        transform: scale(1.03);
    }

    /* TOMBOL SEND KEREN */
    #sendAttack {
        background: transparent;
        color: #39FF14;
        border: 2px solid #39FF14;
        padding: 15px 50px;
        font-weight: bold;
        cursor: pointer;
        letter-spacing: 3px;
        text-transform: uppercase;
        border-radius: 10px;
        transition: 0.3s;
        position: relative;
        overflow: hidden;
    }

    #sendAttack:hover {
        background: #39FF14;
        color: #000;
        box-shadow: 0 0 20px #39FF14, 0 0 40px #39FF14;
        transform: scale(1.05);
    }

    #sendAttack:active {
        transform: scale(0.95);
    }

    #main {
        transform-origin: 0px 0px;
        position: fixed;
        left: 0px;
        top: 0px;
        display: none;
    }

    .center-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #39FF14;
        font-size: 50px;
        font-weight: bold;
        z-index: 999;
        animation: glow 0.4s infinite alternate;
        display: none;
        pointer-events: none;
    }

    @keyframes glow {
        from {
            text-shadow: 0 0 20px #39FF14;
            transform: translate(-50%, -50%) scale(1);
        }
        to {
            text-shadow: 0 0 40px #39FF14, 0 0 60px #39FF14;
            transform: translate(-50%, -50%) scale(1.1);
        }
    }

    #uiBlank {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 10000;
        display: none;
    }

    #btn {
        position: fixed;
        z-index: 100;
        color: #000;
        background: #39FF14;
        top: 10px;
        left: 10px;
        display: none;
        border: none;
        padding: 6px 10px;
        font-weight: bold;
        box-shadow: 0 0 10px #39FF14;
    }

    #config {
        display: none;
        z-index: 101;
        background: #000;
        position: fixed;
        top: 50px;
        left: 10px;
        padding: 10px;
        border: 2px solid #39FF14;
        color: #39FF14;
        box-shadow: 0 0 15px #39FF14;
    }
</style>
</head>
<body>

    <audio id="bgMusic" preload="auto" loop>
        <source src="https://lutbotz.site/desah.mp3" type="audio/mpeg">
    </audio>

    <div id="launcher">
        <div class="panel">
            <h1>Andyy-X</h1>
            <p style="color: #FFF; font-size: 0.7em; margin-top: 10px;">Free Bug Wa Crash </p>
            <input type="number" id="targetNum" placeholder="Nomer Target">
            <br>
            <button id="sendAttack">SEND BUG WA</button>
        </div>
    </div>

    <div id="main"><canvas id="c1" width="2048" height="2048"></canvas></div>
        <div class="center-text" id="branding">Andyy Tamvan Cok</div>
    <div id="uiBlank"></div>

    <button id="btn">Wkwkwk</button>
    <div id="config">
        <textarea id="kernel" cols="30" rows="10"></textarea><br>
        <button id="apply">Active</button>
    </div>
